name: Build & Release

# Se dispara de dos formas:
# 1. Manual desde la UI (workflow_dispatch) — útil para rebuilds o testing
# 2. Vía repository_dispatch — disparado por el repo privado al taggear

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag/branch/commit del repo privado a buildear (ej: v1.0.13 o main)'
        required: true
        default: 'main'
      version:
        description: 'Versión del release a publicar (ej: 1.0.13). Si vacío, usa el ref.'
        required: false
  repository_dispatch:
    types: [build-release]

permissions:
  contents: write

env:
  PRIVATE_REPO: agambobe/sendwa
  BUILD_REF:    ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
  VERSION:      ${{ github.event.inputs.version || github.event.client_payload.version || '' }}

jobs:

  # ════════════════════════════════════════════════════════════
  #  Resolver versión a partir del input o del ref
  # ════════════════════════════════════════════════════════════
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      ref:     ${{ steps.v.outputs.ref }}
    steps:
      - name: Resolver versión
        id: v
        run: |
          REF="${{ env.BUILD_REF }}"
          VER="${{ env.VERSION }}"
          if [ -z "$VER" ]; then
            # Si el ref es vX.Y.Z, extraer la versión
            VER="${REF#v}"
            if ! echo "$VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::warning::No se pudo deducir versión del ref '$REF'. Usando '0.0.0-${REF}'."
              VER="0.0.0-${REF}"
            fi
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Building ref='$REF' as version='$VER'"

  # ════════════════════════════════════════════════════════════
  #  BUILD WINDOWS  →  SendWA-Setup.exe
  # ════════════════════════════════════════════════════════════
  build-windows:
    needs: setup
    runs-on: windows-latest

    steps:
      - name: Checkout código privado
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ needs.setup.outputs.ref }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias Python
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pystray Pillow pyinstaller pywin32

      - name: Descargar Node.js portátil (Windows x64)
        shell: pwsh
        run: |
          $ver = "20.19.2"
          $url = "https://nodejs.org/dist/v$ver/node-v$ver-win-x64.zip"
          New-Item -ItemType Directory -Force build\node-win | Out-Null
          Invoke-WebRequest $url -OutFile build\node-win.zip -UseBasicParsing
          Expand-Archive build\node-win.zip -DestinationPath build\node-win-tmp -Force
          $inner = (Get-ChildItem build\node-win-tmp -Directory)[0].FullName
          Copy-Item "$inner\*" build\node-win\ -Recurse -Force
          Remove-Item build\node-win-tmp -Recurse -Force
          Remove-Item build\node-win.zip -Force

      - name: Compilar con PyInstaller
        shell: pwsh
        run: python -m PyInstaller build\sendwa.spec --noconfirm --clean

      - name: Copiar whatsapp-service al dist (solo JS, sin node_modules)
        shell: pwsh
        run: |
          $dest = "dist\SendWA\whatsapp-service"
          New-Item -ItemType Directory -Force $dest | Out-Null
          robocopy whatsapp-service $dest /E /XD node_modules /NFL /NDL /NJH /NJS
          $rc = $LASTEXITCODE
          if ($rc -gt 7) { throw "robocopy fallo: $rc" }
          foreach ($d in @("data","media","logs")) {
            New-Item -ItemType Directory -Force "dist\SendWA\$d" | Out-Null
          }
          $global:LASTEXITCODE = 0

      - name: Generar instalador con Inno Setup
        shell: pwsh
        run: |
          $iscc = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "Inno Setup no encontrado" }
          $version = "${{ needs.setup.outputs.version }}"
          & $iscc "/DAppVersion=$version" build\installer_windows.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC fallo: $LASTEXITCODE" }
          $size = [math]::Round((Get-Item dist\SendWA-Setup.exe).Length / 1MB, 1)
          Write-Host "Instalador generado: $size MB"

      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist\SendWA-Setup.exe
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  #  BUILD macOS  →  SendWA.app autocontenido (PyInstaller)
  #  Igual que Windows: Python + Node embebidos, sin brew/pip/npm.
  #  Build por arquitectura → DMG (Apple Silicon).
  # ════════════════════════════════════════════════════════════
  build-macos:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14        # Apple Silicon
            node_arch: darwin-arm64
          # Intel (macos-13) retirado: los runners x86_64 quedan colgados en
          # cola y bloquean el release. Para re-habilitarlo, agregar:
          #   - arch: intel
          #     runner: macos-13
          #     node_arch: darwin-x64
    runs-on: ${{ matrix.runner }}

    env:
      NODE_VER: '20.19.2'

    steps:
      - name: Checkout código privado
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ needs.setup.outputs.ref }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pystray Pillow pyobjc-core pyobjc-framework-Cocoa

      - name: Generar íconos (.icns / .ico)
        run: python build/generate_icons.py

      - name: Descargar Node.js portátil (${{ matrix.node_arch }})
        run: |
          curl -fsSL "https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-${{ matrix.node_arch }}.tar.gz" -o /tmp/node.tar.gz
          mkdir -p build/node-mac
          tar -xzf /tmp/node.tar.gz -C /tmp
          cp -R /tmp/node-v${NODE_VER}-${{ matrix.node_arch }}/* build/node-mac/
          build/node-mac/bin/node --version

      - name: Pre-instalar node_modules del whatsapp-service
        run: |
          export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
          export PUPPETEER_SKIP_DOWNLOAD=true
          NODE="$PWD/build/node-mac/bin/node"
          NPM="$PWD/build/node-mac/lib/node_modules/npm/bin/npm-cli.js"
          cd whatsapp-service
          "$NODE" "$NPM" install --omit=dev --no-audit --no-fund
          du -sh node_modules

      - name: Compilar SendWA.app con PyInstaller
        run: python -m PyInstaller build/sendwa.spec --noconfirm --clean

      - name: Empaquetar whatsapp-service (con node_modules) dentro del .app
        run: |
          RES="dist/SendWA.app/Contents/Resources"
          rsync -a --exclude='.git/' whatsapp-service/ "$RES/whatsapp-service/"
          find "$RES/app" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          ls -la "$RES"

      - name: Firmar (ad-hoc) el .app
        run: |
          codesign --deep --force -s - dist/SendWA.app
          codesign --verify --deep --strict dist/SendWA.app && echo "firma OK"

      - name: Crear DMG SendWA-macos-${{ matrix.arch }}.dmg
        run: |
          STAGE="dist/dmg-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp -R dist/SendWA.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          cp build/macos/README.md "$STAGE/Léeme.md"
          cp build/macos/Desinstalar-SendWA.command "$STAGE/"
          chmod +x "$STAGE/Desinstalar-SendWA.command"
          DMG="dist/SendWA-macos-${{ matrix.arch }}.dmg"
          hdiutil create -volname "SendWA" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          du -sh "$DMG"

      - name: Subir DMG como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/SendWA-macos-${{ matrix.arch }}.dmg
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  #  RELEASE  →  publica en ESTE repo (público)
  # ════════════════════════════════════════════════════════════
  release:
    needs: [setup, build-windows, build-macos]
    # Windows es obligatorio. macOS NO bloquea: si su build (o una de las dos
    # arquitecturas) falla, igual publicamos Windows + el/los DMG mac que sí
    # salieron. 'always()' hace que release corra aunque build-macos falle;
    # el guard exige que Windows haya sido exitoso.
    if: ${{ always() && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: release-files/
          merge-multiple: true

      - name: Verificar archivos
        run: |
          ls -lh release-files/ || true
          # Solo Windows es obligatorio. El DMG mac se adjunta si existe.
          [ -f release-files/SendWA-Setup.exe ] || { echo "::error::Falta SendWA-Setup.exe (build Windows)"; exit 1; }
          [ -f release-files/SendWA-macos-arm64.dmg ] && echo "ok: SendWA-macos-arm64.dmg" \
            || echo "::warning::macOS arm64 no presente — se publica sin el"

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.setup.outputs.version }}"
          name: "SendWA v${{ needs.setup.outputs.version }}"
          body: |
            ## SendWA v${{ needs.setup.outputs.version }}

            ### Instalación

            #### Windows
            1. Descarga `SendWA-Setup.exe`
            2. Ejecuta — Siguiente → Siguiente → Finalizar
            3. Si Windows SmartScreen lo bloquea: clic en **"Más información"** → **"Ejecutar de todas formas"**

            #### macOS (Apple Silicon — M1/M2/M3/M4)
            1. Descarga `SendWA-macos-arm64.dmg` y ábrelo
            2. Arrastra **SendWA.app** a **Aplicaciones**
            3. **Primera vez:** clic derecho sobre SendWA.app → **Abrir** → **Abrir**
               (si no abre: Terminal → `xattr -cr /Applications/SendWA.app`)

            No necesitas instalar Python ni Node.js — vienen incluidos.

            ### Requisito
            Tener **Google Chrome** o **Microsoft Edge** instalado.

            ### Soporte
            - WhatsApp: [+57 317 115 7536](https://wa.me/573171157536)
            - Email: sales@velyne.com
          files: |
            release-files/SendWA-Setup.exe
            release-files/SendWA-macos-arm64.dmg
          # No fallar si falta el DMG mac (build mac desacoplado de Windows)
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
